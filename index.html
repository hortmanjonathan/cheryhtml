<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>Chery Argentina</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --chery-accent: #A89076;
      --chery-accent2: #856B4E;
      --chery-accent3: #645E59;
      --chery-dark: #1a1714;
      --chery-mid: #221e1a;
      --chery-gray: #7a7470;
      --chery-light: #c8bfb5;
      --chery-white: #ffffff;
      --nav-height: 56px;
      /* reducido de 72px */
    }

    html,
    body {
      height: 100%;
      font-family: 'Barlow', sans-serif;
      background: var(--chery-dark);
      color: var(--chery-white);
      overflow-x: hidden;
    }

    /* ─── NAVBAR ──────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 32px;
      background: #DAD9D7;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-logo img {
      height: 22px;
      /* ligeramente reducido */
      width: auto;
      display: block;
    }

    /* ─── BACKGROUND HERO ─────────────────────────────────── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: blur(1px) brightness(0.65);
      transform: scale(1.02);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
          rgba(0, 0, 0, 0.45) 0%,
          rgba(20, 15, 10, 0.22) 60%,
          rgba(0, 0, 0, 0.52) 100%);
    }

    /* ─── PAGE CONTENT ────────────────────────────────────── */
    .page-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding-top: var(--nav-height);
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      min-height: calc(100vh - var(--nav-height));
      padding: 64px 72px;
      max-width: 760px;
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--chery-accent);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(52px, 7vw, 96px);
      font-weight: 900;
      line-height: 0.93;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--chery-white);
      margin-bottom: 24px;
    }

    .hero-title em {
      font-style: italic;
      color: var(--chery-accent);
    }

    .hero-subtitle {
      font-size: 16px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
      max-width: 460px;
      margin-bottom: 44px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--chery-accent);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 34px;
      transition: background 0.2s;
    }

    .hero-cta:hover {
      background: var(--chery-accent2);
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      .hero {
        padding: 40px 24px;
      }
    }
  </style>
</head>

<body>

  <!-- ── BACKGROUND ── -->
  <div class="bg-wrap">
    <img src="cherybg.jpg" alt="Chery background" />
    <div class="bg-overlay"></div>
  </div>

  <!-- ── NAVBAR ── -->
  <nav>
    <a class="nav-logo" href="https://chery.com.ar/">
      <img src="https://chery.com.ar/wp-content/uploads/2025/06/Capa_1-1.png" alt="Chery Argentina"
        onerror="this.onerror=null;this.src='';this.style.display='none';this.parentElement.innerHTML='<span style=\'font-family:Barlow Condensed,sans-serif;font-size:24px;font-weight:900;letter-spacing:0.12em;color:#fff;\'>CHERY</span>'" />
    </a>
  </nav>

  <!-- ── HERO ── -->
  <div class="page-content">
    <section class="hero">
      <span class="hero-eyebrow">Chery Argentina</span>
      <h1 class="hero-title">Movilidad <em>inteligente</em><br>para vos</h1>
      <p class="hero-subtitle">
        Descubrí la gama Chery: tecnología, diseño y eficiencia en cada modelo.
        Hablá con nuestro asistente virtual para conocer financiación, modelos y test drives.
      </p>
      <a class="hero-cta" href="https://chery.com.ar/">Conocé más</a>
    </section>
  </div>

  <!-- ── SALESFORCE EMBEDDED MESSAGING ── -->
  <script type='text/javascript'>
    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = 'es_MX';

        embeddedservice_bootstrap.init(
          '00DKd000005bs3Z',
          'Asistente_Chery',
          'https://micuenta.my.site.com/ESWAsistenteChery1781877897678',
          {
            scrt2URL: 'https://micuenta.my.salesforce-scrt.com'
          }
        );
      } catch (err) {
        console.error('Error loading Embedded Messaging: ', err);
      }
    };
  </script>
  <script type='text/javascript' src='https://micuenta.my.site.com/ESWAsistenteChery1781877897678/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

</body>

</html>
